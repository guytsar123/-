# הגדרת פריסה ל-Render (תוכנית חינמית).
# הערה: ב-free אין דיסק קבוע — הרשימה נשמרת בקבצים זמניים שמתאפסים בכל deploy/שינה.
# לשמירה קבועה: שדרג ל-plan: starter והחזר את בלוק ה-disk (mountPath /data + DATA_DIR=/data).
services:
  - type: web
    name: whatsapp-shopping-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: ./data
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
      - key: ALLOWED_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
